name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Если твоя ветка называется master, замени main на master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          # Передаем твой ключ как строку в кавычках (без знака $)
          GEMINI_API_KEY: "AIzaSyBjgiImbbRq0aXfGd9xLeZBzP5x4zIvs-0"
          VITE_GEMINI_API_KEY: "AIzaSyBjgiImbbRq0aXfGd9xLeZBzP5x4zIvs-0"

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Папка, которую создает Vite после сборки
