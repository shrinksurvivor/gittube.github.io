name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # или master, если у тебя так называется главная ветка

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          # Здесь мы передаем API ключ для работы аудита кода
          VITE_GEMINI_API_KEY: ${{ AIzaSyBjgiImbbRq0aXfGd9xLeZBzP5x4zIvs-0 }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # папка, которую создал Vite
